<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Admin</title>
    <style>
        :root {
            --primary: #000000;
            --danger: #ff4444;
            --success: #00c851;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: space-between;
        }

        input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            flex-grow: 1;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-refresh {
            background: var(--primary);
            color: white;
        }

        .btn-delete-manual {
            background: var(--danger);
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f1f1f1;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        tr:hover {
            background: #fafafa;
        }

        .btn-table-del {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 4px 8px;
            font-size: 0.8rem;
        }

        .btn-table-del:hover {
            background: var(--danger);
            color: white;
        }

        #status {
            margin-top: 15px;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>👤 Gestión de Usuarios</h1>

        <div class="controls">
            <input type="text" id="manualCedula" placeholder="Cédula para borrar manualmente...">
            <button class="btn-delete-manual" onclick="deleteManual()">Eliminar por Cédula</button>
            <button class="btn-refresh" onclick="loadUsers()">🔄 Actualizar lista</button>
        </div>

        <div id="status"></div>

        <div
            style="background:#e3f2fd; padding:20px; border-radius:12px; margin-bottom:30px; border:1px solid #bbdefb;">
            <h3 style="margin-top:0; color:#1565c0;">🏥 Crear Nuevo Profesional (Multi-Tenant)</h3>
            <p style="font-size:0.9rem; color:#555; margin-bottom:15px;">Al crear un profesional, se generará
                automáticamete una base de datos aislada para sus pacientes.</p>

            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:15px;">
                <input type="text" id="newProName" placeholder="Nombre del Profesional (ej. Dr. Juan)"
                    style="padding:12px;">
                <input type="email" id="newProEmail" placeholder="Correo (ej. juan@medico.com)" style="padding:12px;">
                <input type="text" id="newProCedula" placeholder="Cédula (Será su ID de Cliente)" style="padding:12px;">
                <button onclick="createProfessional()"
                    style="background:#1565c0; color:white; font-weight:bold; padding:12px; border-radius:6px; border:none; cursor:pointer;">
                    ✨ Crear Profesional
                </button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Cédula (ID)</th>
                    <th>Rol</th>
                    <th>Client App ID</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="userTableBody">
                <!-- Data here -->
            </tbody>
        </table>
    </div>

    <script src="../config.js"></script>
    <script>
        // GLOBAL ERROR HANDLER
        window.onerror = function (msg, url, line) {
            alert('❌ ERROR JAVASCRIPT DETECTADO:\n' + msg + '\nLínea: ' + line);
            return false;
        };

        if (typeof CONFIG === 'undefined') {
            alert('❌ Error Crítico: No se cargó el archivo config.js.\nVerifique que exista en la carpeta public.');
            throw new Error('CONFIG not found');
        }

        const USER_API = CONFIG.USERS_URL;

        // LOAD USERS
        async function loadUsers() {
            const status = document.getElementById('status');
            const tbody = document.getElementById('userTableBody');

            if (!status || !tbody) return; // Silent fail if elements missing (unlikely)

            status.innerText = 'Cargando usuarios...';
            tbody.innerHTML = '';

            try {
                const url = `${USER_API}?cedula=ALL&role=admin&clientId=${CONFIG.CLIENT_ID}`;
                console.log('Cargando usuarios desde:', url);

                const res = await fetch(url);
                const data = await res.json();

                if (data.success && data.users) {
                    if (data.users.length === 0) {
                        status.innerText = 'No hay usuarios registrados.';
                    } else {
                        data.users.forEach(u => {
                            const isPending = u.role === 'professional' && u.status === 'pending';
                            const statusBadge = isPending ?
                                `<span style="background:#fff3e0; color:#e65100; padding:2px 6px; border-radius:4px; font-size:0.8em; margin-left:5px;">⚠️ Pendiente</span>` :
                                (u.status === 'active' ? `<span style="color:green; font-size:0.8em; margin-left:5px;">✅ Activo</span>` : '');

                            const approveBtn = isPending ?
                                `<button onclick="approveUser('${u.cedula}')" style="background:#2e7d32; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; margin-right:5px;">Aprobar</button>` : '';

                            const tr = document.createElement('tr');
                            tr.innerHTML = `
                        <td>${u.name} ${statusBadge}</td>
                        <td>${u.email || '-'}</td>
                        <td>${u.cedula}</td>
                        <td><span style="background:${u.role === 'professional' ? '#e3f2fd' : '#f5f5f5'}; padding:4px 8px; border-radius:4px; font-weight:bold; color:${u.role === 'professional' ? '#1565c0' : '#666'}">${u.role}</span></td>
                        <td><code>${u.clientId || 'N/A'}</code></td>
                        <td>
                            ${approveBtn}
                            <button class="btn-table-del" onclick="deleteUser('${u.cedula}')">Eliminar</button>
                        </td>
                    `;
                            tbody.appendChild(tr);
                        });
                        status.innerText = `Mostrando ${data.users.length} usuarios.`;
                    }
                } else {
                    status.innerText = '⚠️ No se pudieron cargar los usuarios. Respuesta: ' + JSON.stringify(data);
                }
            } catch (e) {
                console.error(e);
                status.innerText = '❌ Error de conexión: ' + e.message;
            }
        }

        async function deleteUser(cedula) {
            if (!confirm(`¿Estás seguro de eliminar al usuario con cédula ${cedula}?`)) return;

            const status = document.getElementById('status');
            status.innerText = 'Eliminando...';

            try {
                const res = await fetch(`${USER_API}?cedula=${cedula}`, {
                    method: 'DELETE'
                });
                const data = await res.json();

                if (data.success) {
                    status.style.color = 'green';
                    status.innerText = '✅ Usuario eliminado correctamente.';
                    loadUsers(); // Reload table
                } else {
                    status.style.color = 'red';
                    status.innerText = '❌ Error: ' + (data.message || 'No se pudo eliminar.');
                }
            } catch (e) {
                status.innerText = 'Error: ' + e.message;
            }
        }

        // CREATE PROFESSIONAL FUNCTION
        async function createProfessional() {
            try {
                console.log('🚀 Iniciando creación de profesional...');

                const nameEl = document.getElementById('newProName');
                const emailEl = document.getElementById('newProEmail');
                const cedulaEl = document.getElementById('newProCedula');
                const status = document.getElementById('status');

                if (!nameEl || !emailEl || !cedulaEl) {
                    alert('Error: No encuentro los cuadros de texto en la página.');
                    return;
                }

                const name = nameEl.value.trim();
                const email = emailEl.value.trim();
                const cedula = cedulaEl.value.trim();

                if (!name || !cedula || !email) {
                    alert('⚠️ Por favor completa TODOS los campos (Nombre, Correo, Cédula).');
                    return;
                }

                status.innerText = '⏳ Conectando con N8N para crear base de datos...';
                status.style.color = 'blue';

                const payload = {
                    name, email, cedula,
                    role: 'professional',
                    type: 'Profesional',
                    clientId: cedula, // FORCE ISOLATION
                    clientName: name
                };

                console.log('Enviando datos:', payload);

                // API CALL
                const res = await fetch(CONFIG.REGISTER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                console.log('Status HTTP:', res.status);
                const data = await res.json();
                console.log('Respuesta JSON:', data);

                if (data.success || data.message === 'Workflow was started') {
                    status.style.color = 'green';
                    status.innerText = '✅ ¡ÉXITO! Profesional creado y base de datos aislada lista.';
                    alert('✅ Profesional Creado Exitosamente.\n\nAhora puedes iniciar sesión con la cédula ' + cedula);

                    // Clear inputs
                    nameEl.value = '';
                    emailEl.value = '';
                    cedulaEl.value = '';

                    loadUsers(); // Refresh table
                } else {
                    status.style.color = 'red';
                    status.innerText = '❌ Error N8N: ' + (data.message || 'Respuesta desconocida');
                    alert('Error del servidor: ' + (data.message || 'Ver consola para más detalles'));
                }

            } catch (e) {
                console.error(e);
                alert('❌ Error Técnico:\n' + e.message + '\n\nRevisa si el servidor n8n está activo.');
            }
        }

        async function approveUser(cedula) {
            if (!confirm('¿Aprobar acceso a este profesional?')) return;
            const status = document.getElementById('status');
            status.innerText = 'Aprobando...';

            try {
                // Call webhook
                const res = await fetch(`${CONFIG.APPROVE_URL}?cedula=${cedula}`);
                const data = await res.json();

                if (data.success) {
                    alert('✅ Profesional aprobado exitosamente.');
                    loadUsers();
                } else {
                    alert('❌ Error: ' + data.message);
                }
            } catch (e) {
                alert('Connection Error: ' + e.message);
            }
        }

        function deleteManual() {
            const cedula = document.getElementById('manualCedula').value.trim();
            if (!cedula) {
                alert('Por favor ingresa una cédula.');
                return;
            }
            deleteUser(cedula);
        }

        // INIT
        console.log('Admin Dashboard Loaded');
        loadUsers();
    </script>

</body>

</html>
