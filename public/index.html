<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Rosette - Agenda tu cita</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f8f9fa;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            background: white;
            position: relative;
            overflow: hidden;
            display: flex;
            max-width: 400px;
            /* Mobile frame effect on desktop */
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.1);
        }

        /* ORANGE CIRCLE */
        .orange-circle {
            position: absolute;
            width: 280px;
            height: 280px;
            background: linear-gradient(135deg, #FFB75E 0%, #FF7B00 100%);
            border-radius: 50%;
            right: -80px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
            box-shadow: 0 0 60px rgba(255, 123, 0, 0.3);
        }

        /* LEFT PANEL (FROSTED) */
        .left-panel {
            position: absolute;
            left: 0;
            top: 0;
            width: 50%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 2;
            border-right: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* CONTENT LAYER */
        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px 30px;
        }

        /* HEADER */
        .header-left {
            display: flex;
            flex-direction: column;
        }

        .month {
            font-size: 42px;
            font-weight: 300;
            color: #333;
            line-height: 1;
        }

        .year {
            font-size: 68px;
            font-weight: 700;
            color: #111;
            line-height: 0.8;
            margin-top: 5px;
        }

        .header-right {
            position: absolute;
            top: 60px;
            right: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-pill {
            background: #E5E5EA;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-pill:hover {
            background: #D1D1D6;
        }

        .label-agenda {
            font-size: 20px;
            font-weight: 400;
            color: #333;
            margin-top: 10px;
        }

        /* CENTER TEXT */
        .center-text {
            width: 55%;
            margin-top: 50px;
        }

        .main-title {
            font-size: 44px;
            font-weight: 800;
            color: #4A4A4A;
            line-height: 0.95;
            letter-spacing: -1px;
        }

        /* FOOTER */
        .footer {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-inicio {
            background: #E5E5EA;
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
        }

        .btn-arrow {
            width: 50px;
            height: 50px;
            background: #E5E5EA;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
        }

        .btn-arrow svg {
            width: 20px;
            height: 20px;
            stroke: #000;
            stroke-width: 3;
            fill: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Layer 1 -->
        <div class="orange-circle"></div>

        <!-- Layer 2 -->
        <div class="left-panel"></div>

        <!-- Layer 3 -->
        <div class="content">
            <!-- Top Section -->
            <div style="display: flex; justify-content: space-between; width: 100%;">
                <div class="header-left">
                    <div class="month">Febrero</div>
                    <div class="year">2026</div>
                </div>
                <div class="header-right">
                    <button class="btn-pill" id="btnRegister">Registro</button>
                    <div class="label-agenda">Agenda</div>
                </div>
            </div>

            <!-- Middle Section -->
            <div class="center-text">
                <h1 class="main-title">Agenda<br>tu cita</h1>
            </div>

            <!-- Bottom Section -->
            <div class="footer">
                <button class="btn-inicio" id="btnLogin">inicio</button>
                <div class="btn-arrow" id="btnArrow">
                    <svg viewBox="0 0 24 24">
                        <path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Navigation Logic
        const goToLogin = () => window.location.href = 'login.html';
        const goToRegister = () => window.location.href = 'register.html';

        document.getElementById('btnLogin').addEventListener('click', goToLogin);
        document.getElementById('btnArrow').addEventListener('click', goToLogin);
        document.getElementById('btnRegister').addEventListener('click', goToRegister);
    </script>
</body>

</html>
