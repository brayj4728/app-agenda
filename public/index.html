<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Rosette - Agenda tu cita</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f4f4f7;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            background: #ffffff;
            position: relative;
            overflow: hidden;
            display: flex;
            max-width: 400px;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.2);
        }

        /* ORANGE CIRCLE */
        .orange-circle {
            position: absolute;
            width: 320px;
            height: 320px;
            background: linear-gradient(135deg, #FFB733 0%, #FF7B00 100%);
            border-radius: 50%;
            right: -100px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
        }

        /* GLOW EFFECT (The Radiant Background) */
        .glow-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 50%, rgba(255, 123, 0, 0.4) 0%, rgba(255, 255, 255, 0) 60%);
            z-index: 2;
            pointer-events: none;
        }

        /* LEFT PANEL (PROMINENT MIRROR EFFECT) */
        .left-panel {
            position: absolute;
            left: 0;
            top: 0;
            width: 48%;
            height: 100%;
            /* Increased white opacity for visibility, but keeping the "glass" look */
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(120px) saturate(180%);
            /* Strong blur + color saturation boost */
            -webkit-backdrop-filter: blur(120px) saturate(180%);
            z-index: 3;
            /* Defined border to "cut" the glass */
            border-right: 1px solid rgba(255, 255, 255, 0.4);
            /* Stronger inner glow for the mirror feeling */
            box-shadow:
                inset 10px 0 60px rgba(255, 255, 255, 0.2),
                inset -0px 0 20px rgba(255, 255, 255, 0.1);
        }

        /* CONTENT LAYER */
        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 80px 40px 60px;
        }

        /* HEADER */
        .header-top {
            display: flex;
            justify-content: flex-end;
            /* Align to right since left part is removed */
            width: 100%;
            align-items: flex-start;
        }

        .header-left {
            display: flex;
            flex-direction: column;
        }

        .month {
            font-size: 38px;
            font-weight: 200;
            /* Extra Thin */
            color: #1c1c1e;
            line-height: 1;
        }

        .year {
            font-size: 78px;
            font-weight: 800;
            /* Heavy Black */
            color: #000;
            line-height: 0.8;
            margin-top: 0px;
            letter-spacing: -3px;
        }

        .header-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 5px;
        }

        .btn-pill-small {
            background: #E5E5EA;
            border: none;
            padding: 9px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
        }

        .label-agenda-small {
            font-size: 18px;
            font-weight: 400;
            color: #333;
            margin-top: 10px;
        }

        /* CENTER TEXT */
        .center-text-block {
            width: 50%;
            margin-top: 40%;
            transform: translateY(-50%);
        }

        .main-title-bold {
            font-size: 36px;
            font-weight: 900;
            /* Maximum Bold */
            color: #333;
            line-height: 0.9;
            letter-spacing: -1.5px;
        }

        /* FOOTER */
        .footer-nav {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .btn-inicio-pill {
            background: #E5E5EA;
            border: none;
            padding: 14px 36px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
        }

        .btn-arrow-circle {
            width: 48px;
            height: 48px;
            background: #E5E5EA;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
        }

        .btn-arrow-circle svg {
            width: 20px;
            height: 20px;
            stroke: #000;
            stroke-width: 3;
            fill: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Layer 1 -->
        <div class="orange-circle"></div>

        <!-- Layer 2: Glow Glow -->
        <div class="glow-overlay"></div>

        <!-- Layer 3: The Blur Wall -->
        <div class="left-panel"></div>

        <!-- Layer 4: Content -->
        <div class="content">
            <!-- Top -->
            <div class="header-top">
                <div class="header-right">
                    <button class="btn-pill-small" id="btnRegister">Registro</button>
                    <div class="label-agenda-small">Agenda</div>
                </div>
            </div>

            <!-- Middle -->
            <div class="center-text-block">
                <h1 class="main-title-bold">Agenda<br>tu cita</h1>
            </div>

            <!-- Bottom -->
            <div class="footer-nav">
                <button class="btn-inicio-pill" id="btnLogin">inicio</button>
                <button class="btn-arrow-circle" id="btnArrow">
                    <svg viewBox="0 0 24 24">
                        <path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const navL = () => window.location.href = 'login.html';
        const navR = () => window.location.href = 'register.html';

        document.getElementById('btnLogin').onclick = navL;
        document.getElementById('btnArrow').onclick = navL;
        document.getElementById('btnRegister').onclick = navR;
    </script>
</body>

</html>
