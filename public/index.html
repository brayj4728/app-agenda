<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Febrero 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
        }

        .container {
            width: 100%;
            height: 100%;
            background: white;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 500px) {
            .container {
                max-width: 400px;
                max-height: 850px;
                border: 1px solid #ddd;
                border-radius: 20px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            }
        }

        /* 
           LAYER 1: Orange Circle (Centered but will be visually behind left panel)
        */
        .orange-circle {
            width: 300px;
            /* Slightly bigger */
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(90deg, rgba(249, 168, 117, 0.9) 0%, rgba(255, 126, 33, 1) 100%);
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-15%, -50%);
            /* Adjusted shift */
            z-index: 1;
        }

        /* 
           LAYER 2: Left Panel "Frosted"
        */
        .left-panel-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            /* This is the key: Transparentish grey with backdrop blur to blur the circle BEHIND it */
            background-color: rgba(248, 249, 250, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 5;
        }

        /* 
           LAYER 3: Content (Text, Buttons) - Topmost
        */
        .content-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
            /* Let clicks pass unless on interactive elements */
        }

        /* Make children interactive */
        .content-layer>* {
            pointer-events: auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 50px 30px;
            /* More top padding per image */
            width: 100%;
        }

        .date-container {
            display: flex;
            flex-direction: column;
            width: 50%;
        }

        .month {
            font-size: 2.8rem;
            /* Adjusted for fit */
            font-weight: 300;
            line-height: 1;
            color: #1a1a1a;
        }

        .year {
            font-size: 4rem;
            font-weight: 400;
            line-height: 0.9;
            color: #1a1a1a;
        }

        .top-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
            /* Space between pill and text */
            padding-top: 5px;
        }

        .btn-registro {
            background-color: #dcdcdc;
            /* Lighter grey */
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            font-size: 0.9rem;
            color: #1a1a1a;
            cursor: pointer;
            font-weight: 500;
        }

        .text-agenda {
            font-size: 1.2rem;
            color: #1a1a1a;
            padding-right: 5px;
            text-align: right;
            font-weight: 400;
        }

        /* Middle Text */
        .middle-text-container {
            padding-left: 30px;
            width: 50%;
        }

        .lorem-text {
            font-size: 1.1rem;
            color: #1a1a1a;
            line-height: 1.4;
            max-width: 90%;
        }

        /* Footer */
        .footer {
            padding: 40px 30px;
            /* Bottom padding */
            display: flex;
            align-items: center;
        }

        .btn-inicio-group {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .btn-inicio-pill {
            background-color: #dcdcdc;
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            font-size: 1rem;
            color: #1a1a1a;
            margin-right: -10px;
            /* Overlap effect */
            z-index: 1;
        }

        .btn-arrow-circle {
            width: 48px;
            height: 48px;
            background-color: #dcdcdc;
            /* Same as pill */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            /* On top */
            border: 2px solid white;
            /* Optional separator illusion if needed, but image looks solid. Let's try solid first or check request. "un solo botón... o dos pegados" */
            border: none;
        }

        .btn-arrow-circle svg {
            width: 18px;
            height: 18px;
            fill: #1a1a1a;
            stroke: #1a1a1a;
            stroke-width: 1px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1 style="position:absolute; z-index:9999; color:black; top:10px; left:10px; font-size:12px; opacity:0.5;">
            Cargando App...</h1>
        <!-- Layer 1: Circle -->
        <div class="orange-circle"></div>

        <!-- Layer 2: Left Blur Panel -->
        <div class="left-panel-blur"></div>

        <!-- Layer 3: Content -->
        <div class="content-layer">

            <!-- Header -->
            <div class="header">
                <div class="date-container">
                    <div class="month">Febrero</div>
                    <div class="year">2026</div>
                </div>
                <div class="top-actions">
                    <button class="btn-registro">Registro</button>
                    <div class="text-agenda">Agenda</div>
                </div>
            </div>

            <!-- Middle Text -->
            <div class="middle-text-container">
                <div class="lorem-text">
                    Jorem ipsum dolor sit amet, <br>
                    consectetur <br>
                    adipiscing elit.
                </div>
            </div>

            <!-- Footer -->
            <div class="footer">
                <div class="btn-inicio-group" onclick="console.log('Inicio Group Clicked')">
                    <div class="btn-inicio-pill">inicio</div>
                    <div class="btn-arrow-circle">
                        <svg viewBox="0 0 24 24">
                            <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z" />
                        </svg>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.querySelector('.btn-registro').addEventListener('click', () => {
            // Navigate to Register Screen
            window.location.href = 'register.html';
        });

        document.querySelector('.btn-inicio-group').addEventListener('click', () => {
            // Navigate to Login Screen
            window.location.href = 'login.html';
        });
    </script>
</body>

</html>
